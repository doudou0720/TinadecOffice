---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      # contents permission to clone the repository
      contents: read
      packages: read
      # Need issues and pull-requests permissions to write results as pull request comments.
      issues: write 
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6.4.0
        with:
          cache: 'npm'

      - run: npm ci

      - name: Super-linter
        uses: super-linter/super-linter@v8.7.0 # Use Standard Runner as it contain Rust and dotnet linters
        env:
          # See FULL Config on https://github.com/super-linter/super-linter
          # Flag to have the linter complete with exit code 0 even if errors were detected, in order not to make cjk unhappy.
          DISABLE_ERRORS: true
          # Disable the BIOME_FORMAT rule, not work well with Prettier
          VALIDATE_BIOME_FORMAT: false
          # NOT Disable the SPELL_CODESPELL rule
          # VALIDATE_SPELL_CODESPELL: false
          # NOT Disable the GITLEAKS rule temporarily
          # VALIDATE_GITLEAKS: false
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
